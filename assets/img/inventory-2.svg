<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="450" fill="#101425"/>
  <!-- in-game inventory mock -->
  <rect x="50" y="35" width="470" height="380" rx="14" fill="#141b24" stroke="#223041" stroke-width="2"/>
  <text x="75" y="75" fill="#e6edf3" font-size="20" font-weight="700">INVENTORY</text>
  <text x="495" y="75" text-anchor="end" fill="#93a4b5" font-size="14">42 / 60 slots</text>
  <g stroke="#223041" stroke-width="2">
    <!-- 5x4 grid -->
    <g fill="#0f141c">
      <rect x="75" y="95" width="80" height="80" rx="8"/><rect x="163" y="95" width="80" height="80" rx="8"/><rect x="251" y="95" width="80" height="80" rx="8"/><rect x="339" y="95" width="80" height="80" rx="8"/><rect x="427" y="95" width="68" height="80" rx="8"/>
      <rect x="75" y="183" width="80" height="80" rx="8"/><rect x="163" y="183" width="80" height="80" rx="8"/><rect x="251" y="183" width="80" height="80" rx="8"/><rect x="339" y="183" width="80" height="80" rx="8"/><rect x="427" y="183" width="68" height="80" rx="8"/>
      <rect x="75" y="271" width="80" height="80" rx="8"/><rect x="163" y="271" width="80" height="80" rx="8"/><rect x="251" y="271" width="80" height="80" rx="8"/><rect x="339" y="271" width="80" height="80" rx="8"/><rect x="427" y="271" width="68" height="80" rx="8"/>
    </g>
  </g>
  <!-- items -->
  <rect x="85" y="105" width="60" height="60" rx="8" fill="#f59e0b"/><text x="148" y="168" text-anchor="end" fill="#fff" font-size="13" font-weight="700">×12</text>
  <rect x="173" y="105" width="60" height="60" rx="8" fill="#34d399"/><text x="236" y="168" text-anchor="end" fill="#fff" font-size="13" font-weight="700">×5</text>
  <rect x="261" y="105" width="60" height="60" rx="8" fill="#22d3ee"/>
  <rect x="85" y="193" width="60" height="60" rx="8" fill="#818cf8"/>
  <rect x="173" y="193" width="60" height="60" rx="8" fill="#ef4444"/><text x="236" y="256" text-anchor="end" fill="#fff" font-size="13" font-weight="700">×3</text>
  <!-- dragged item -->
  <rect x="380" y="230" width="66" height="66" rx="9" fill="#f59e0b" opacity="0.85" transform="rotate(8 413 263)" stroke="#22d3ee" stroke-width="3"/>
  <!-- tooltip / details panel -->
  <rect x="545" y="35" width="205" height="380" rx="14" fill="#141b24" stroke="#223041" stroke-width="2"/>
  <rect x="570" y="60" width="60" height="60" rx="8" fill="#22d3ee"/>
  <text x="570" y="150" fill="#e6edf3" font-size="17" font-weight="700">Frost Blade</text>
  <text x="570" y="172" fill="#818cf8" font-size="13" font-weight="600">EPIC · WEAPON</text>
  <text x="570" y="205" fill="#93a4b5" font-size="13">Damage        +48</text>
  <text x="570" y="228" fill="#93a4b5" font-size="13">Frost DoT     +12/s</text>
  <text x="570" y="251" fill="#93a4b5" font-size="13">Durability    96%</text>
  <rect x="570" y="340" width="155" height="38" rx="8" fill="#22d3ee"/>
  <text x="647" y="365" text-anchor="middle" fill="#06121a" font-size="15" font-weight="700">EQUIP</text>
</svg>
