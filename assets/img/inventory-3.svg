<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="450" fill="#101425"/>
  <rect x="60" y="40" width="680" height="370" rx="12" fill="#141b24" stroke="#223041" stroke-width="2"/>
  <text x="90" y="85" fill="#e6edf3" font-size="20" font-weight="700">⚒ CRAFTING</text>
  <!-- recipe: 2 ingredients -> result -->
  <g>
    <rect x="120" y="140" width="110" height="110" rx="12" fill="#0f141c" stroke="#223041" stroke-width="2"/>
    <rect x="140" y="160" width="70" height="70" rx="8" fill="#f59e0b"/>
    <text x="175" y="280" text-anchor="middle" fill="#93a4b5" font-size="14">Iron Ore ×4</text>
    <text x="270" y="205" fill="#22d3ee" font-size="34" font-weight="700">+</text>
    <rect x="310" y="140" width="110" height="110" rx="12" fill="#0f141c" stroke="#223041" stroke-width="2"/>
    <rect x="330" y="160" width="70" height="70" rx="8" fill="#34d399"/>
    <text x="365" y="280" text-anchor="middle" fill="#93a4b5" font-size="14">Wood ×2</text>
    <text x="460" y="205" fill="#22d3ee" font-size="34" font-weight="700">→</text>
    <rect x="510" y="125" width="140" height="140" rx="14" fill="#0f141c" stroke="#22d3ee" stroke-width="3"/>
    <rect x="535" y="150" width="90" height="90" rx="10" fill="#818cf8"/>
    <text x="580" y="292" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700">Steel Sword</text>
  </g>
  <rect x="120" y="330" width="530" height="46" rx="10" fill="#22d3ee"/>
  <text x="385" y="360" text-anchor="middle" fill="#06121a" font-size="17" font-weight="700">CRAFT  (2.5s)</text>
  <text x="680" y="358" fill="#93a4b5" font-size="13">Queue: 3</text>
</svg>
